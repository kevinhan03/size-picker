<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bottom Taste Graph Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/force-graph"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101116;
      --panel: rgba(25, 27, 33, 0.88);
      --panel-strong: #242832;
      --text: #f3f4f6;
      --muted: #a5acb8;
      --faint: #697283;
      --tag: #f59e0b;
      --tag-strong: #f97316;
      --item-stroke: #e7ebf3;
      --danger: #fb7185;
      --warning: #facc15;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button { font: inherit; }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      background:
        radial-gradient(circle at 50% 42%, rgba(255, 255, 255, 0.045), transparent 44%),
        linear-gradient(180deg, #151720 0%, #0e0f13 100%);
    }

    #graph {
      width: 100%;
      height: 100%;
      opacity: 1;
      transition: opacity 120ms ease;
    }

    .topbar {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      z-index: 5;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      pointer-events: none;
    }

    .status-panel,
    .product-panel {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(12px);
    }

    .status-panel {
      max-width: min(720px, calc(100vw - 32px));
      padding: 12px 14px;
      pointer-events: auto;
    }

    .status-title {
      margin: 0 0 4px;
      font-size: 14px;
      font-weight: 750;
    }

    .status-line {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .status-panel.error { border-color: rgba(251, 113, 133, 0.5); }
    .status-panel.warning { border-color: rgba(250, 204, 21, 0.48); }

    .controls {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      pointer-events: auto;
    }

    .control-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 36px;
      padding: 0 14px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.07));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: #e5e7eb;
      font-size: 12px;
      font-weight: 700;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
      cursor: pointer;
      transition: border-color 150ms ease, color 150ms ease, box-shadow 150ms ease;
    }

    .control-button:hover:not(:disabled) {
      border-color: rgba(249, 115, 22, 0.6);
      color: #fb923c;
    }

    .control-button:disabled {
      color: rgba(165, 172, 184, 0.55);
      cursor: default;
      opacity: 0.55;
    }

    .control-button.active {
      border-color: rgba(249, 115, 22, 0.65);
      color: #fdba74;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 0 22px rgba(249, 115, 22, 0.18);
    }

    .search-input {
      min-height: 36px;
      width: 220px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: var(--text);
      font-size: 13px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 14px 30px rgba(0, 0, 0, 0.24);
      outline: none;
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }

    .search-input::placeholder { color: rgba(165, 172, 184, 0.75); }

    .search-input:hover:not(:disabled) {
      border-color: rgba(249, 115, 22, 0.5);
    }

    .search-input:disabled {
      color: var(--faint);
      cursor: default;
      opacity: 0.55;
    }

    .search-input:focus {
      border-color: rgba(251, 146, 60, 0.7);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 0 0 3px rgba(249, 115, 22, 0.2);
    }

    .product-panel {
      position: absolute;
      top: 72px;
      right: 16px;
      z-index: 6;
      display: none;
      width: min(320px, calc(100vw - 32px));
      padding: 14px;
      pointer-events: auto;
    }

    .product-panel.visible { display: block; }

    .product-title {
      margin: 2px 0 10px;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.35;
    }

    .product-brand {
      margin: 0;
      color: var(--tag);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .product-tags {
      display: grid;
      gap: 8px;
      margin: 0;
    }

    .product-tag-row {
      display: grid;
      grid-template-columns: 72px 1fr 42px;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .product-tag-name {
      color: var(--text);
      font-weight: 750;
    }

    .product-tag-bar {
      height: 6px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
    }

    .product-tag-fill {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #38bdf8, #7dd3fc);
      box-shadow: 0 0 10px rgba(56, 189, 248, 0.35);
    }

    .product-tag-score {
      color: var(--muted);
      font-weight: 750;
      text-align: right;
    }

    .product-note {
      margin: 10px 0 0;
      color: var(--faint);
      font-size: 12px;
      line-height: 1.4;
    }

    .product-review {
      margin-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding-top: 10px;
    }

    .product-review-toggle {
      cursor: pointer;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      list-style: none;
    }

    .product-review-toggle::-webkit-details-marker { display: none; }

    .product-review-toggle::before {
      content: "▸";
      display: inline-block;
      margin-right: 6px;
      color: var(--tag);
      transition: transform 120ms ease;
    }

    .product-review[open] .product-review-toggle::before {
      transform: rotate(90deg);
    }

    .product-review-note {
      margin: 8px 0 0;
      color: var(--text);
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .product-similar-title {
      margin: 14px 0 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .product-similar-list {
      display: grid;
      gap: 6px;
    }

    .product-similar-row {
      display: grid;
      grid-template-columns: 1fr 40px;
      align-items: center;
      gap: 8px;
      width: 100%;
      margin: 0;
      padding: 4px 6px;
      border: none;
      border-radius: 6px;
      background: transparent;
      font: inherit;
      font-size: 13px;
      color: inherit;
      text-align: left;
      cursor: pointer;
      transition: background-color 120ms ease;
    }

    .product-similar-row:hover,
    .product-similar-row:focus-visible {
      background: rgba(255, 255, 255, 0.08);
      outline: none;
    }

    .product-similar-row:hover .product-similar-name,
    .product-similar-row:focus-visible .product-similar-name {
      color: #fb923c;
    }

    .product-similar-name {
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 120ms ease;
    }

    .product-similar-score {
      color: #38bdf8;
      font-weight: 750;
      text-align: right;
    }

    @media (max-width: 760px) {
      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .controls {
        justify-content: flex-start;
        flex-wrap: wrap;
      }

      .search-input { width: 100%; }
      .control-button { flex: 1 1 auto; }

      .product-panel { top: auto; right: 16px; bottom: 126px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="graph"></div>

    <div class="topbar">
      <div id="status" class="status-panel">
        <p class="status-title">바지 취향그래프</p>
        <p class="status-line">Supabase 설정을 확인하는 중...</p>
      </div>

      <div class="controls" aria-label="그래프 보기 제어">
        <input id="searchInput" class="search-input" type="search" placeholder="브랜드/상품명 검색" disabled />
        <button id="viewModeButton" class="control-button" type="button" disabled>유사도 뷰로 전환</button>
        <button id="resetViewButton" class="control-button" type="button" disabled>전체 보기로 돌아가기</button>
      </div>
    </div>

    <aside id="productPanel" class="product-panel" aria-live="polite"></aside>
  </div>

  <script>
    const SUPABASE_URL = "https://sforepkezedpjlasqfnn.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNmb3JlcGtlemVkcGpsYXNxZm5uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzODM2MjIsImV4cCI6MjA4OTk1OTYyMn0.iYTS6AhYEGGuJLGD8zOl1tZXcPEj3lOj0yhvHameOfY";
    const CATEGORY = "Bottom";
    const STORAGE_BUCKET = "product-assets";
    const TAG_TOP_N = 2;
    const PRODUCT_PANEL_TAG_TOP_N = 5;
    const SECOND_TAG_MIN_CONFIDENCE = 0.15;
    const EMBEDDING_TOP_K = 2;
    const SIMILAR_TOP_K = 5;
    const ITEM_COLLAPSED_OPACITY = 0.82;
    const SEARCH_DIM_OPACITY = 0.06;
    const ITEM_COLLAPSED_RADIUS = 14;
    const ITEM_DETAIL_RADIUS = 20;
    const MIN_TAG_RADIUS = 20;
    const MAX_TAG_RADIUS = 42;
    const TAG_LABEL_ZOOM_FADE_START = 2.0;
    const TAG_LABEL_ZOOM_FADE_END = 2.35;
    const TAGS = [
      "casual",
      "minimal",
      "street",
      "classic",
      "vintage",
      "lovely_romantic",
      "sporty",
      "workwear_gorpcore",
      "chic_modern",
      "glam_sexy"
    ];
    // 10개 태그 카테고리 색상 - dataviz 스킬 validate_palette.js로 다크 모드/전체쌍 CVD 검증 완료
    // (worst all-pairs ΔE 8.5, deutan floor-band 통과 — 태그 노드에 항상 라벨 텍스트가 같이 그려지므로
    // secondary encoding 요건 충족)
    const TAG_COLORS = {
      casual: { base: "#3987e5", bright: "#5598e9" },
      minimal: { base: "#199e70", bright: "#39ac84" },
      street: { base: "#c98500", bright: "#d19624" },
      classic: { base: "#008300", bright: "#249424" },
      vintage: { base: "#8f3fe0", bright: "#9f5ae4" },
      lovely_romantic: { base: "#e66767", bright: "#ea7c7c" },
      sporty: { base: "#c94f9e", bright: "#d168ac" },
      workwear_gorpcore: { base: "#d95926", bright: "#de7044" },
      chic_modern: { base: "#2a9fb0", bright: "#48acbb" },
      glam_sexy: { base: "#e0629c", bright: "#e478aa" }
    };
    const DEFAULT_TAG_COLOR = { base: "#f59e0b", bright: "#f97316" };
    const tagColor = (tag) => TAG_COLORS[tag] || DEFAULT_TAG_COLOR;

    const LEGACY_TAG_KEY_MAP = {
      "캐주얼": "casual",
      "미니멀": "minimal",
      "스트릿": "street",
      "클래식": "classic",
      "빈티지": "vintage",
      "레트로": "vintage",
      "로맨틱": "lovely_romantic",
      "스포티": "sporty",
      "워크웨어": "workwear_gorpcore"
    };

    const graphEl = document.querySelector("#graph");
    const statusEl = document.querySelector("#status");
    const resetViewButton = document.querySelector("#resetViewButton");
    const viewModeButton = document.querySelector("#viewModeButton");
    const searchInput = document.querySelector("#searchInput");
    const productPanel = document.querySelector("#productPanel");

    let Graph = null;
    let graphState = null;
    let viewMode = "tag"; // 'tag' | 'embedding'
    let searchQuery = "";
    let selectedTag = null;
    let selectedProductNodeId = null;
    let initialFitDone = false;
    let initialFitCallback = null;
    const imageCache = new Map();

    function setStatus(title, lines, type = "info") {
      statusEl.classList.toggle("error", type === "error");
      statusEl.classList.toggle("warning", type === "warning");
      const body = Array.isArray(lines) ? lines : [lines];
      statusEl.innerHTML = [
        `<p class="status-title">${escapeHtml(title)}</p>`,
        ...body.map((line) => `<p class="status-line">${escapeHtml(String(line))}</p>`)
      ].join("");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function isConfigured() {
      return Boolean(SUPABASE_URL.trim() && SUPABASE_ANON_KEY.trim());
    }

    function encodeStoragePath(path) {
      return String(path)
        .trim()
        .replace(/^\/+/, "")
        .split("/")
        .map((segment) => encodeURIComponent(segment))
        .join("/");
    }

    function resolveImageUrl(imagePath) {
      const raw = String(imagePath || "").trim();
      if (!raw) return "";
      if (/^https?:\/\//i.test(raw)) return raw;
      return `${SUPABASE_URL.replace(/\/+$/, "")}/storage/v1/object/public/${encodeURIComponent(STORAGE_BUCKET)}/${encodeStoragePath(raw)}`;
    }

    function parseEmbedding(raw) {
      if (Array.isArray(raw)) {
        const values = raw.map(Number).filter(Number.isFinite);
        return values.length ? values : null;
      }

      if (typeof raw === "string") {
        const cleaned = raw.trim().replace(/^\[/, "").replace(/\]$/, "");
        const values = cleaned
          .split(",")
          .map((value) => Number(value.trim()))
          .filter(Number.isFinite);
        return values.length ? values : null;
      }

      if (raw && typeof raw === "object" && Array.isArray(raw.values)) {
        const values = raw.values.map(Number).filter(Number.isFinite);
        return values.length ? values : null;
      }

      return null;
    }

    function cosineSimilarity(a, b) {
      const length = Math.min(a.length, b.length);
      if (!length) return null;

      let dot = 0;
      let normA = 0;
      let normB = 0;

      for (let index = 0; index < length; index += 1) {
        const av = a[index];
        const bv = b[index];
        dot += av * bv;
        normA += av * av;
        normB += bv * bv;
      }

      if (!normA || !normB) return null;
      return dot / (Math.sqrt(normA) * Math.sqrt(normB));
    }

    function normalizeStyleTags(styleTags) {
      if (!styleTags || typeof styleTags !== "object" || Array.isArray(styleTags)) return {};
      const normalized = {};
      for (const [rawTag, rawScore] of Object.entries(styleTags)) {
        const tag = TAGS.includes(rawTag) ? rawTag : LEGACY_TAG_KEY_MAP[rawTag];
        if (!tag) continue;
        const score = Number(rawScore);
        if (Number.isFinite(score)) normalized[tag] = Math.max(normalized[tag] || 0, Math.min(1, Math.max(0, score)));
      }
      return normalized;
    }

    function getEffectiveStyleTags(row) {
      const status = String(row.tag_review_status || "").trim();
      const hasReviewedTags =
        row.human_style_tags &&
        typeof row.human_style_tags === "object" &&
        !Array.isArray(row.human_style_tags);

      if ((status === "approved" || status === "edited") && hasReviewedTags) {
        return { tags: row.human_style_tags, source: "human" };
      }

      return { tags: row.style_tags, source: "ai" };
    }

    function selectTopTags(styleTags, limit = TAG_TOP_N, options = {}) {
      const enforceSecondThreshold = options.enforceSecondThreshold !== false;
      const sorted = Object.entries(styleTags)
        .filter(([, score]) => Number.isFinite(score) && score > 0)
        .sort((a, b) => b[1] - a[1])
        .slice(0, limit);

      if (!enforceSecondThreshold || sorted.length <= 1) return sorted;
      if (sorted[1][1] < SECOND_TAG_MIN_CONFIDENCE) return [sorted[0]];
      return sorted;
    }

    function getImage(url) {
      if (!url) return null;
      if (imageCache.has(url)) return imageCache.get(url);
      const image = new Image();
      image.crossOrigin = "anonymous";
      image.decoding = "async";
      image.onload = () => redrawBriefly();
      image.src = url;
      imageCache.set(url, image);
      return image;
    }

    function createGraph(rows) {
      const warnings = { missingStyleTags: 0, missingEmbedding: 0, invalidEmbedding: 0, missingImagePath: 0 };
      const nodes = [];
      const tagLinks = [];
      const tagItems = new Map(TAGS.map((tag) => [tag, []]));
      const tagCounts = new Map(TAGS.map((tag) => [tag, 0]));
      const productByNodeId = new Map();

      const products = rows.map((row) => {
        const embedding = parseEmbedding(row.image_embedding);
        const effectiveStyleTags = getEffectiveStyleTags(row);
        if (!effectiveStyleTags.tags) warnings.missingStyleTags += 1;
        if (!row.image_embedding) warnings.missingEmbedding += 1;
        if (row.image_embedding && !embedding) warnings.invalidEmbedding += 1;
        if (!row.image_path) warnings.missingImagePath += 1;

        return {
          id: String(row.id),
          nodeId: `item:${row.id}`,
          label: String(row.name || `Product ${row.id}`),
          brand: String(row.brand || "").trim(),
          imageUrl: resolveImageUrl(row.image_path),
          styleTags: normalizeStyleTags(effectiveStyleTags.tags),
          styleTagSource: effectiveStyleTags.source,
          tagReviewStatus: String(row.tag_review_status || "").trim(),
          tagReviewNote: String(row.tag_review_note || "").trim(),
          embedding
        };
      });

      for (const product of products) {
        const topTags = selectTopTags(product.styleTags);
        product.tagAssignments = topTags.map(([tag, score], index) => ({ tag, score, rank: index + 1 }));
        product.panelTagAssignments = selectTopTags(product.styleTags, PRODUCT_PANEL_TAG_TOP_N, {
          enforceSecondThreshold: false
        }).map(([tag, score], index) => ({ tag, score, rank: index + 1 }));
        productByNodeId.set(product.nodeId, product);

        nodes.push({
          id: product.nodeId,
          type: "item",
          productId: product.id,
          label: product.label,
          imageUrl: product.imageUrl,
          product,
          radius: ITEM_COLLAPSED_RADIUS,
          visible: true,
          opacity: ITEM_COLLAPSED_OPACITY
        });

        const scoreTotal = topTags.reduce((sum, [, score]) => sum + score, 0) || 1;
        topTags.forEach(([tag, score], index) => {
          const link = {
            source: product.nodeId,
            target: `tag:${tag}`,
            tag,
            productNodeId: product.nodeId,
            weight: score,
            rank: index + 1,
            normalizedStrength: score / scoreTotal,
            type: "tag",
            visible: true
          };
          tagLinks.push(link);
          tagCounts.set(tag, (tagCounts.get(tag) || 0) + 1);
          tagItems.get(tag).push({ productNodeId: product.nodeId, weight: score, rank: index + 1 });
        });
      }

      const connectedTags = TAGS.filter((tag) => (tagCounts.get(tag) || 0) > 0);
      const maxTagCount = Math.max(1, ...connectedTags.map((tag) => tagCounts.get(tag) || 0));
      for (const tag of connectedTags) {
        const count = tagCounts.get(tag) || 0;
        nodes.push({
          id: `tag:${tag}`,
          type: "tag",
          label: tag,
          count,
          radius: MIN_TAG_RADIUS + (MAX_TAG_RADIUS - MIN_TAG_RADIUS) * Math.sqrt(count / maxTagCount),
          visible: true,
          opacity: 1
        });
        tagItems.get(tag).sort((a, b) => b.weight - a.weight || a.rank - b.rank);
      }

      const embeddingForceLinks = createEmbeddingForceLinks(products);
      const forceLinks = [...tagLinks, ...embeddingForceLinks];

      return {
        nodes,
        links: tagLinks,
        forceLinks,
        embeddingForceLinks,
        products,
        productByNodeId,
        tagItems,
        warnings,
        counts: { items: products.length, tags: connectedTags.length, tagLinks: tagLinks.length, embeddingLinks: embeddingForceLinks.length }
      };
    }

    function createEmbeddingForceLinks(products) {
      const productsWithEmbedding = products.filter((product) => product.embedding);
      const pairMap = new Map();

      for (const product of productsWithEmbedding) {
        const scored = [];
        for (const other of productsWithEmbedding) {
          if (product.id === other.id) continue;
          const similarity = cosineSimilarity(product.embedding, other.embedding);
          if (Number.isFinite(similarity)) scored.push({ other, similarity });
        }

        scored.sort((a, b) => b.similarity - a.similarity);
        for (const entry of scored.slice(0, EMBEDDING_TOP_K)) {
          const left = product.nodeId < entry.other.nodeId ? product.nodeId : entry.other.nodeId;
          const right = product.nodeId < entry.other.nodeId ? entry.other.nodeId : product.nodeId;
          const key = `${left}|${right}`;
          const existing = pairMap.get(key);
          const weight = Math.max(0, Math.min(1, entry.similarity));

          if (!existing || weight > existing.weight) {
            pairMap.set(key, {
              source: left,
              target: right,
              weight,
              type: "embedding",
              visible: false
            });
          }
        }
      }

      return Array.from(pairMap.values());
    }

    async function loadProducts() {
      if (!isConfigured()) {
        setStatus("Supabase 설정 필요", [
          "파일 상단의 SUPABASE_URL, SUPABASE_ANON_KEY 값을 채운 뒤 다시 열어주세요.",
          `현재 기본 카테고리는 ${CATEGORY}입니다.`
        ], "error");
        return null;
      }

      const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      const { data, error } = await client
        .from("products")
        .select("id,brand,name,category,image_path,style_tags,human_style_tags,tag_review_status,tag_review_note,image_embedding")
        .eq("category", CATEGORY)
        .order("id", { ascending: true });

      if (error) throw new Error(`products 조회 실패: ${error.message}`);
      return Array.isArray(data) ? data : [];
    }

    function getLinkStyle(link) {
      if (link.type === "embedding") {
        const color = link.highlighted ? "#7dd3fc" : "#38bdf8";
        const width = link.highlighted ? 2.5 + link.weight * 2 : 0.6 + link.weight * 1.6;
        return { color, width };
      }
      const colors = tagColor(link.tag);
      const color = link.highlighted ? colors.bright : colors.base;
      const width = link.highlighted ? 3.2 + link.weight * 3 : 0.8 + link.weight * 2.4;
      return { color, width };
    }

    function linkDistance(link) {
      return link.type === "embedding" ? 40 + (1 - link.weight) * 60 : 148;
    }

    function linkStrength(link) {
      if (link.type === "embedding") {
        return viewMode === "embedding" ? 0.05 + link.weight * 0.35 : 0.02 + link.weight * 0.08;
      }
      return viewMode === "embedding" ? 0.01 : 0.05 + link.normalizedStrength * 0.24;
    }

    function chargeStrength(node) {
      if (node.type !== "tag") return -62;
      return viewMode === "embedding" ? -30 : -620;
    }

    function initGraph(graph, onInitialFit) {
      graphState = graph;
      selectedTag = null;
      selectedProductNodeId = null;
      initialFitDone = false;
      initialFitCallback = typeof onInitialFit === "function" ? onInitialFit : null;
      graphEl.style.opacity = "0";

      Graph = ForceGraph()(graphEl)
        .backgroundColor("rgba(0,0,0,0)")
        .graphData({ nodes: graph.nodes, links: graph.forceLinks })
        .nodeId("id")
        .nodeRelSize(1)
        .nodeVal((node) => Math.max(1, node.radius || 4))
        .linkVisibility((link) => Boolean(link.visible))
        .linkColor((link) => getLinkStyle(link).color)
        .linkWidth((link) => link.visible ? getLinkStyle(link).width : 0)
        .linkDirectionalParticles(0)
        .linkCanvasObjectMode(() => "replace")
        .linkCanvasObject((link, ctx) => {
          if (!link.visible) return;
          const { color, width } = getLinkStyle(link);
          ctx.save();
          ctx.globalAlpha = link.highlighted ? 0.95 : (link.opacity ?? 0.3);
          ctx.strokeStyle = color;
          ctx.lineWidth = width;
          ctx.beginPath();
          ctx.moveTo(link.source.x, link.source.y);
          ctx.lineTo(link.target.x, link.target.y);
          ctx.stroke();
          ctx.restore();
        })
        .nodeCanvasObject((node, ctx, globalScale) => drawNode(node, ctx, globalScale))
        .nodePointerAreaPaint((node, color, ctx) => {
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.arc(node.x, node.y, Math.max(6, node.radius || 4), 0, Math.PI * 2);
          ctx.fill();
        })
        .onNodeClick((node) => {
          if (viewMode === "tag" && node.type === "tag") {
            showTagDetail(node.label);
          } else if (node.type === "item" && node.visible) {
            showProductInsight(node.id);
          }
        })
        .onBackgroundClick(() => clearProductInsight())
        .cooldownTicks(45)
        .d3AlphaDecay(0.105)
        .d3VelocityDecay(0.58);

      Graph.d3Force("link").distance(linkDistance).strength(linkStrength);
      Graph.d3Force("charge").strength(chargeStrength);
      Graph.d3Force("center").strength(0.035);
      Graph.d3Force("collision", d3.forceCollide((node) => Math.max(7, (node.radius || 4) + (node.type === "tag" ? 14 : 5))).iterations(1));

      viewModeButton.disabled = false;
      searchInput.disabled = false;
      showOverview(false);
    }

    function setViewMode(mode) {
      if (!graphState || viewMode === mode) return;
      viewMode = mode;
      viewModeButton.textContent = viewMode === "tag" ? "유사도 뷰로 전환" : "태그 뷰로 전환";
      viewModeButton.classList.toggle("active", viewMode === "embedding");
      Graph.d3Force("link").strength(linkStrength);
      Graph.d3Force("charge").strength(chargeStrength);

      if (selectedProductNodeId) {
        showProductInsight(selectedProductNodeId);
      } else if (selectedTag && viewMode === "tag") {
        showTagDetail(selectedTag);
      } else {
        showOverview(true);
      }
    }

    function drawNode(node, ctx, globalScale) {
      if (!node.visible && node.type === "item") {
        if (node.opacity <= 0) return;
      }

      const radius = node.radius || 4;
      ctx.save();
      ctx.globalAlpha = node.opacity ?? 1;

      if (node.type === "tag") {
        const colors = tagColor(node.label);
        ctx.beginPath();
        ctx.fillStyle = node.selected || node.connected ? colors.bright : colors.base;
        ctx.strokeStyle = "rgba(255,255,255,0.78)";
        ctx.lineWidth = node.selected || node.connected ? 2.2 : 1.25;
        ctx.arc(node.x, node.y, radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        const emphasized = node.selected || node.connected;
        const zoomFade = emphasized
          ? 1
          : Math.max(0, Math.min(1, (globalScale - TAG_LABEL_ZOOM_FADE_START) / (TAG_LABEL_ZOOM_FADE_END - TAG_LABEL_ZOOM_FADE_START)));

        if (zoomFade > 0) {
          const fontSize = Math.max(9, Math.min(13, radius / 2.4)) / globalScale;
          ctx.font = `800 ${fontSize}px Inter, system-ui, sans-serif`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.lineWidth = 3 / globalScale;
          ctx.globalAlpha = (node.opacity ?? 1) * zoomFade;
          ctx.strokeStyle = "rgba(0,0,0,0.45)";
          ctx.fillStyle = "#fff7ed";
          ctx.strokeText(node.label, node.x, node.y);
          ctx.fillText(node.label, node.x, node.y);
        }
      } else {
        ctx.save();
        ctx.beginPath();
        ctx.arc(node.x, node.y, radius, 0, Math.PI * 2);
        ctx.clip();

        const image = getImage(node.imageUrl);
        if (image && image.complete && image.naturalWidth) {
          ctx.drawImage(image, node.x - radius, node.y - radius, radius * 2, radius * 2);
        } else {
          ctx.fillStyle = "#767d89";
          ctx.fillRect(node.x - radius, node.y - radius, radius * 2, radius * 2);
        }

        ctx.restore();
        ctx.beginPath();
        ctx.arc(node.x, node.y, radius, 0, Math.PI * 2);
        const dominantTag = node.product?.tagAssignments?.[0]?.tag;
        const dominantColor = dominantTag ? tagColor(dominantTag).base : "rgba(255,255,255,0.72)";
        ctx.strokeStyle = node.selected ? "#ffffff" : node.similar ? "#38bdf8" : dominantColor;
        ctx.lineWidth = node.selected ? 3 : node.similar ? 2.5 : 1.6;
        ctx.stroke();
      }

      ctx.restore();
    }

    function tagId(tag) {
      return `tag:${tag}`;
    }

    function linkSourceId(link) {
      return typeof link.source === "object" ? link.source.id : link.source;
    }

    function linkTargetId(link) {
      return typeof link.target === "object" ? link.target.id : link.target;
    }

    function visibleItemSetForTag(tag) {
      const entries = graphState.tagItems.get(tag) || [];
      return new Set(entries.map((entry) => entry.productNodeId));
    }

    function getSimilarProducts(product) {
      if (!product.embedding) return [];
      return graphState.products
        .filter((p) => p.id !== product.id && p.embedding)
        .map((p) => ({ product: p, similarity: cosineSimilarity(product.embedding, p.embedding) }))
        .filter((e) => Number.isFinite(e.similarity))
        .sort((a, b) => b.similarity - a.similarity)
        .slice(0, SIMILAR_TOP_K);
    }

    function resetVisualState() {
      for (const node of graphState.nodes) {
        node.selected = false;
        node.connected = false;
        node.highlighted = false;
        node.similar = false;
      }
      for (const link of graphState.forceLinks) {
        link.highlighted = false;
        link.visible = viewMode === "tag" ? link.type === "tag" : link.type === "embedding";
        link.opacity = !link.visible ? 0 : (link.type === "tag" ? 0.34 : 0.28);
      }
    }

    function applySearchFilter() {
      if (!graphState) return;
      const query = searchQuery.trim().toLowerCase();
      for (const node of graphState.nodes) {
        if (node.type !== "item") continue;
        const base = node.baseOpacity ?? node.opacity;
        if (!query) {
          node.opacity = base;
          continue;
        }
        const haystack = `${node.product.brand} ${node.product.label}`.toLowerCase();
        node.opacity = haystack.includes(query) ? base : Math.min(base, SEARCH_DIM_OPACITY);
      }
      redrawBriefly();
    }

    function showOverview(animate = true) {
      if (!graphState) return;
      selectedTag = null;
      selectedProductNodeId = null;
      resetViewButton.disabled = true;
      productPanel.classList.remove("visible");
      productPanel.innerHTML = "";
      resetVisualState();

      for (const node of graphState.nodes) {
        if (node.type === "tag") {
          node.visible = viewMode === "tag";
          node.opacity = viewMode === "tag" ? 1 : 0;
          node.radius = node.radius || MIN_TAG_RADIUS;
        } else {
          node.visible = true;
          node.opacity = ITEM_COLLAPSED_OPACITY;
          node.radius = ITEM_COLLAPSED_RADIUS;
        }
      }

      for (const node of graphState.nodes) {
        if (node.type === "item") node.baseOpacity = node.opacity;
      }
      applySearchFilter();

      Graph.nodeVal((node) => Math.max(1, node.radius || 4));
      if (animate) reheatBriefly();
      fitOverview(animate ? 650 : 0);
    }

    function reheatBriefly() {
      Graph.d3ReheatSimulation();
    }

    function redrawBriefly() {
      if (!Graph) return;
      Graph.d3ReheatSimulation();
    }

    function fitOverview(duration = 0) {
      const includeNode = (node) => node.type === "item" || (node.type === "tag" && viewMode === "tag");
      if (!initialFitDone) {
        initialFitDone = true;
        window.setTimeout(() => {
          if (!Graph || selectedTag || selectedProductNodeId) return;
          Graph.zoomToFit(0, 90, includeNode);
          window.requestAnimationFrame(() => {
            graphEl.style.opacity = "1";
            if (initialFitCallback) {
              initialFitCallback();
              initialFitCallback = null;
            }
          });
        }, 180);
        return;
      }
      Graph.zoomToFit(duration, 90, includeNode);
    }

    function showTagDetail(tag) {
      if (!graphState || viewMode !== "tag") return;
      selectedTag = tag;
      selectedProductNodeId = null;
      resetViewButton.disabled = false;
      productPanel.classList.remove("visible");
      productPanel.innerHTML = "";
      resetVisualState();

      const selectedTagId = tagId(tag);
      const visibleItems = visibleItemSetForTag(tag);

      for (const node of graphState.nodes) {
        if (node.id === selectedTagId) {
          node.visible = true;
          node.opacity = 1;
          node.selected = true;
        } else if (node.type === "tag") {
          node.visible = true;
          node.opacity = 0.18;
        } else if (visibleItems.has(node.id)) {
          node.visible = true;
          node.opacity = 1;
          node.radius = ITEM_DETAIL_RADIUS;
        } else {
          node.visible = true;
          node.opacity = ITEM_COLLAPSED_OPACITY;
          node.radius = ITEM_COLLAPSED_RADIUS;
        }
      }

      for (const link of graphState.forceLinks) {
        if (link.type === "tag") {
          const sourceId = linkSourceId(link);
          link.visible = link.tag === tag && visibleItems.has(sourceId);
          link.opacity = link.visible ? 0.68 : 0;
        }
      }

      for (const node of graphState.nodes) {
        if (node.type === "item") node.baseOpacity = node.opacity;
      }
      applySearchFilter();

      Graph.nodeVal((node) => Math.max(1, node.radius || 4));
      reheatBriefly();
      Graph.zoomToFit(700, 80, (node) => node.id === selectedTagId || visibleItems.has(node.id));
    }

    function showProductInsight(productNodeId) {
      if (!graphState) return;
      const product = graphState.productByNodeId.get(productNodeId);
      if (!product) return;

      selectedProductNodeId = productNodeId;
      const assignments = product.tagAssignments || [];
      const connectedTagIds = new Set(assignments.map((assignment) => tagId(assignment.tag)));
      const connectedLinkKeys = new Set(assignments.map((assignment) => `${productNodeId}|${assignment.tag}`));
      const similarProducts = getSimilarProducts(product);
      const similarNodeIds = new Set(similarProducts.map((e) => e.product.nodeId));

      for (const node of graphState.nodes) {
        node.selected = node.id === productNodeId;
        node.connected = viewMode === "tag" && connectedTagIds.has(node.id);
        node.similar = similarNodeIds.has(node.id);
        if (node.id === productNodeId || node.connected) {
          node.visible = true;
          node.opacity = 1;
          if (node.type === "item") node.radius = ITEM_DETAIL_RADIUS;
        } else if (similarNodeIds.has(node.id)) {
          node.visible = true;
          node.opacity = 1;
          node.radius = ITEM_DETAIL_RADIUS;
        } else if (node.type === "tag") {
          node.opacity = viewMode === "tag" ? 0.16 : 0;
        } else {
          node.opacity = ITEM_COLLAPSED_OPACITY;
        }
      }

      for (const link of graphState.forceLinks) {
        if (link.type !== "tag") continue;
        const key = `${linkSourceId(link)}|${link.tag}`;
        link.highlighted = viewMode === "tag" && connectedLinkKeys.has(key);
        link.visible = link.highlighted;
        link.opacity = link.highlighted ? 0.9 : 0;
      }

      for (const node of graphState.nodes) {
        if (node.type === "item") node.baseOpacity = node.opacity;
      }
      applySearchFilter();

      renderProductPanel(product, product.panelTagAssignments || assignments, similarProducts);
      redrawBriefly();
    }

    function clearProductInsight() {
      if (!graphState || !selectedProductNodeId) return;
      selectedProductNodeId = null;
      productPanel.classList.remove("visible");
      productPanel.innerHTML = "";
      if (selectedTag) showTagDetail(selectedTag);
      else showOverview(true);
    }

    function renderProductPanel(product, assignments, similarProducts = []) {
      const tagRows = assignments.length
        ? assignments.map((assignment) => {
          const percent = Math.round(assignment.score * 100);
          return `
            <div class="product-tag-row">
              <span class="product-tag-name">${escapeHtml(assignment.tag)}</span>
              <span class="product-tag-bar"><span class="product-tag-fill" style="width: ${percent}%"></span></span>
              <span class="product-tag-score">${assignment.score.toFixed(2)}</span>
            </div>
          `;
        }).join("")
        : `<div class="product-tag-row"><span class="product-tag-name">태그 없음</span><span></span><span></span></div>`;

      const similarSection = similarProducts.length
        ? `
          <p class="product-similar-title">비슷한 상품</p>
          <div class="product-similar-list">
            ${similarProducts.map((e) => `
              <button type="button" class="product-similar-row" data-node-id="${escapeHtml(e.product.nodeId)}">
                <span class="product-similar-name">${escapeHtml(e.product.label)}</span>
                <span class="product-similar-score">${(e.similarity * 100).toFixed(0)}%</span>
              </button>
            `).join("")}
          </div>
        `
        : `<p class="product-note">임베딩 데이터 없음</p>`;

      const reviewNoteSection = product.tagReviewNote
        ? `
          <details class="product-review">
            <summary class="product-review-toggle">태그 수정 근거</summary>
            <p class="product-review-note">${escapeHtml(product.tagReviewNote)}</p>
          </details>
        `
        : "";

      productPanel.innerHTML = `
        ${product.brand ? `<p class="product-brand">${escapeHtml(product.brand)}</p>` : ""}
        <h2 class="product-title">${escapeHtml(product.label)}</h2>
        <div class="product-tags">${tagRows}</div>
        ${similarSection}
        ${reviewNoteSection}
      `;
      productPanel.classList.add("visible");
    }

    function summarizeWarnings(graph) {
      const embeddableCount = graph.products.filter((p) => p.embedding).length;
      const lines = [`카테고리 ${CATEGORY}: 상품 ${graph.counts.items}개, 태그 ${graph.counts.tags}개, 태그링크 ${graph.counts.tagLinks}개, 임베딩 ${embeddableCount}개`];
      if (graph.warnings.missingStyleTags) lines.push(`style_tags 누락 상품 ${graph.warnings.missingStyleTags}개`);
      if (graph.warnings.missingEmbedding) lines.push(`image_embedding 누락 상품 ${graph.warnings.missingEmbedding}개`);
      if (graph.warnings.invalidEmbedding) lines.push(`image_embedding 파싱 실패 상품 ${graph.warnings.invalidEmbedding}개`);
      if (graph.warnings.missingImagePath) lines.push(`image_path 누락 상품 ${graph.warnings.missingImagePath}개`);
      return lines;
    }

    async function init() {
      try {
        const rows = await loadProducts();
        if (!rows) return;
        if (!rows.length) {
          setStatus("데이터 없음", `category = ${CATEGORY} 조건에 해당하는 상품이 없습니다.`, "warning");
          return;
        }

        const graph = createGraph(rows);
        const hasWarning = Object.values(graph.warnings).some(Boolean) || !graph.counts.embeddingLinks;
        initGraph(graph, () => {
          setStatus(hasWarning ? "로드 완료, 일부 누락 있음" : "로드 완료", summarizeWarnings(graph), hasWarning ? "warning" : "info");
        });
      } catch (error) {
        console.error(error);
        setStatus("데이터 로딩 실패", error && error.message ? error.message : String(error), "error");
      }
    }

    resetViewButton.addEventListener("click", () => showOverview(true));
    viewModeButton.addEventListener("click", () => setViewMode(viewMode === "tag" ? "embedding" : "tag"));
    searchInput.addEventListener("input", () => {
      searchQuery = searchInput.value;
      applySearchFilter();
    });
    productPanel.addEventListener("click", (event) => {
      const row = event.target.closest(".product-similar-row");
      if (!row) return;
      const nodeId = row.dataset.nodeId;
      if (nodeId) showProductInsight(nodeId);
    });

    window.addEventListener("resize", () => {
      if (!Graph) return;
      Graph.width(window.innerWidth).height(window.innerHeight);
      const fallbackInclude = (node) => node.type === "item" || (node.type === "tag" && viewMode === "tag");
      Graph.zoomToFit(350, 90, (node) => selectedTag ? (node.id === tagId(selectedTag) || node.visible) : fallbackInclude(node));
    });

    window.__tasteGraph = {
      showTagDetail,
      showProductInsight,
      showOverview,
      getState: () => graphState,
      zoom: () => (Graph ? Graph.zoom() : null)
    };

    init();
  </script>
</body>
</html>
