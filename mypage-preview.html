<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyPage Design Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: #1a1a1a;
      /* 글래스 블러가 투과할 배경 컬러 오브 */
      background-image:
        radial-gradient(ellipse 55% 45% at 12% 20%, rgba(249,115,22,0.14) 0%, transparent 65%),
        radial-gradient(ellipse 50% 55% at 88% 80%, rgba(99,102,241,0.11) 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 55% 45%, rgba(236,72,153,0.06) 0%, transparent 60%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ── 카드: 글래스모피즘 ── */
    .card {
      background: rgba(255,255,255,0.055);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 1.25rem;
      overflow: hidden;
      /* 상단 엣지 하이라이트 + 외부 드롭섀도 */
      box-shadow:
        0 1px 0 rgba(255,255,255,0.08) inset,
        0 12px 40px rgba(0,0,0,0.55),
        0 2px 8px rgba(0,0,0,0.35);
    }

    /* ── 내부 요소: 뉴모피즘(inset) ── */
    .inset-box {
      background: rgba(0,0,0,0.28);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.04);
      box-shadow:
        inset -4px -4px 9px rgba(255,255,255,0.07),
        inset  4px  4px 11px rgba(0,0,0,0.65);
    }

    /* ── 버튼: 뉴모피즘(raised) on glass ── */
    .neu-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      cursor: pointer;
      box-shadow:
        -4px -4px 10px rgba(255,255,255,0.08),
         4px  4px 10px rgba(0,0,0,0.55);
      transition: box-shadow 0.15s ease;
    }
    .neu-btn:active {
      box-shadow:
        inset -3px -3px 7px rgba(255,255,255,0.07),
        inset  3px  3px 9px rgba(0,0,0,0.6);
    }

    .neu-btn-danger { color: rgba(248,113,113,0.9); }
    .neu-btn-ghost  { color: rgba(156,163,175,0.9); }

    /*
      grid-auto-rows: 10px + gap: 15px → span N 실제 높이 = 25N − 15 px
      왼쪽 합: 7+11+13 = 31  /  오른쪽 합: 12+10+9 = 31
    */
    .bento {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-auto-rows: 10px;
      gap: 15px;
      max-width: 560px;
      margin: 0 auto;
    }
    @media (min-width: 768px) {
      .bento { max-width: 860px; gap: 18px; grid-auto-rows: 12px; }
      .scroll-row { gap: 10px; }
    }

    .scroll-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .scroll-row::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- Header — 글래스 -->
  <header style="
    background: rgba(26,26,26,0.65);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    position:fixed;top:0;width:100%;z-index:50;
  ">
    <div style="max-width:1152px;margin:0 auto;padding:0 1rem;height:4rem;display:flex;align-items:center;justify-content:space-between;">
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-weight:700;font-size:1.25rem;letter-spacing:-0.02em;color:#f97316;">DIGDA</span>
        <span style="color:#4b5563;font-size:0.75rem;">| kevin_Han</span>
      </div>
      <div style="display:flex;gap:12px;align-items:center;">
        <div class="neu-btn" style="width:34px;height:34px;border-radius:10px;"></div>
        <div class="neu-btn" style="width:34px;height:34px;border-radius:10px;"></div>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main style="padding-top:8rem;padding-bottom:4rem;padding-left:1rem;padding-right:1rem;">
    <div class="bento">

      <!-- ① Profile — col1, span 7 = 160px -->
      <div class="card" style="grid-column:1;grid-row:1/span 7;padding:1.1rem;display:flex;flex-direction:column;justify-content:space-between;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;">
          <!-- 아바타 — 뉴모피즘 raised + orange glow -->
          <div style="
            width:38px;height:38px;border-radius:50%;
            background: rgba(249,115,22,0.08);
            border: 1px solid rgba(249,115,22,0.18);
            display:flex;align-items:center;justify-content:center;
            box-shadow:
              -3px -3px 8px rgba(249,115,22,0.15),
               3px  3px 8px rgba(0,0,0,0.7),
               0 0 16px rgba(249,115,22,0.1);
          ">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(251,146,60,0.85)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <button class="neu-btn" style="padding:5px 6px;display:flex;flex-direction:column;gap:3px;align-items:center;">
            <div style="width:3px;height:3px;border-radius:50%;background:rgba(107,114,128,0.7);"></div>
            <div style="width:3px;height:3px;border-radius:50%;background:rgba(107,114,128,0.7);"></div>
            <div style="width:3px;height:3px;border-radius:50%;background:rgba(107,114,128,0.7);"></div>
          </button>
        </div>
        <div>
          <p style="color:#e5e7eb;font-weight:700;font-size:0.8rem;margin:0 0 2px;">kevin_Han</p>
          <p style="color:#9ca3af;font-size:0.65rem;margin:0;">내 계정</p>
        </div>
      </div>

      <!-- ② My Closet — col1, span 11 = 260px (rows 8-18) -->
      <div class="card" style="grid-column:1;grid-row:8/span 11;padding:1.1rem;display:flex;flex-direction:column;gap:10px;">
        <div style="display:flex;align-items:center;gap:5px;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(251,146,60,0.8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.38 3.46L16 2a4 4 0 01-8 0L3.62 3.46a2 2 0 00-1.34 2.23l.58 3.57a1 1 0 00.99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 002-2V10h2.15a1 1 0 00.99-.84l.58-3.57a2 2 0 00-1.34-2.23z"/>
          </svg>
          <span style="color:#e5e7eb;font-weight:700;font-size:0.78rem;">My Closet</span>
        </div>
        <div style="flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:4px;">
          <div style="position:relative;width:58.5%;aspect-ratio:1/1;">
            <div class="inset-box" style="position:absolute;left:0;right:0;top:0;height:94%;border-radius:13px;z-index:1;background:rgba(180,180,180,0.18);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.18);"></div>
            <div class="inset-box" style="position:absolute;left:0;right:3%;top:6%;height:94%;border-radius:13px;z-index:2;background:rgba(90,90,90,0.35);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.1);"></div>
            <div class="inset-box" style="position:absolute;left:0;right:6%;top:12%;bottom:0;border-radius:13px;z-index:3;background:rgba(20,20,20,0.72);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.07);"></div>
          </div>
        </div>
        <div style="display:flex;justify-content:flex-end;">
          <span style="color:#9ca3af;font-size:0.62rem;">전체 보기 →</span>
        </div>
      </div>

      <!-- ③ 내가 즐겨 입는 사이즈 — col1, span 13 = 310px (rows 19-31) -->
      <div class="card" style="grid-column:1;grid-row:19/span 13;padding:1.1rem;display:flex;flex-direction:column;gap:14px;">
        <p style="color:#e5e7eb;font-weight:700;font-size:0.78rem;margin:0;">내가 즐겨<br>입는 사이즈</p>
        <div style="display:flex;flex-direction:column;gap:10px;flex:1;justify-content:center;">
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <span style="color:#9ca3af;font-size:0.68rem;">상의</span>
            <div class="inset-box" style="width:48px;height:22px;border-radius:7px;"></div>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <span style="color:#9ca3af;font-size:0.68rem;">하의</span>
            <div class="inset-box" style="width:48px;height:22px;border-radius:7px;"></div>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <span style="color:#9ca3af;font-size:0.68rem;">신발</span>
            <div class="inset-box" style="width:48px;height:22px;border-radius:7px;"></div>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <span style="color:#9ca3af;font-size:0.68rem;">아우터</span>
            <div class="inset-box" style="width:48px;height:22px;border-radius:7px;"></div>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <span style="color:#9ca3af;font-size:0.68rem;">악세서리</span>
            <div class="inset-box" style="width:48px;height:22px;border-radius:7px;"></div>
          </div>
        </div>
        <button class="neu-btn" style="width:100%;padding:8px 0;font-size:0.68rem;font-weight:600;color:#9ca3af;">수정</button>
      </div>

      <!-- ④ 위시리스트 — col2, span 12 = 285px (rows 1-12) -->
      <div class="card" style="grid-column:2;grid-row:1/span 12;padding:1.1rem;display:flex;flex-direction:column;gap:10px;">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div style="display:flex;align-items:center;gap:7px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="rgba(250,204,21,0.8)" stroke="rgba(250,204,21,0.8)" stroke-width="1.5">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
            <span style="color:#e5e7eb;font-weight:700;font-size:0.875rem;">위시리스트</span>
          </div>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="2">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>
        <div style="flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:4px;">
          <div style="position:relative;width:58.5%;aspect-ratio:1/1;">
            <div class="inset-box" style="position:absolute;left:0;right:0;top:0;height:94%;border-radius:13px;z-index:1;background:rgba(180,180,180,0.18);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.18);"></div>
            <div class="inset-box" style="position:absolute;left:0;right:3%;top:6%;height:94%;border-radius:13px;z-index:2;background:rgba(90,90,90,0.35);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.1);"></div>
            <div class="inset-box" style="position:absolute;left:0;right:6%;top:12%;bottom:0;border-radius:13px;z-index:3;background:rgba(20,20,20,0.72);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.07);"></div>
          </div>
        </div>
      </div>

      <!-- ⑤ 최근 본 상품 — col2, span 10 = 235px (rows 13-22) -->
      <div class="card" style="grid-column:2;grid-row:13/span 10;padding:1.1rem;display:flex;flex-direction:column;gap:10px;">
        <div style="display:flex;align-items:center;gap:6px;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#4b5563" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
          <span style="color:#e5e7eb;font-weight:700;font-size:0.78rem;">최근 본 상품</span>
        </div>
        <div style="flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:4px;">
          <div style="position:relative;width:58.5%;aspect-ratio:1/1;">
            <div class="inset-box" style="position:absolute;left:0;right:0;top:0;height:94%;border-radius:13px;z-index:1;background:rgba(180,180,180,0.18);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.18);"></div>
            <div class="inset-box" style="position:absolute;left:0;right:3%;top:6%;height:94%;border-radius:13px;z-index:2;background:rgba(90,90,90,0.35);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.1);"></div>
            <div class="inset-box" style="position:absolute;left:0;right:6%;top:12%;bottom:0;border-radius:13px;z-index:3;background:rgba(20,20,20,0.72);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.07);"></div>
          </div>
        </div>
      </div>

      <!-- ⑥ 내 명적 — col2, span 9 = 210px (rows 23-31) -->
      <div class="card" style="grid-column:2;grid-row:23/span 9;padding:1.1rem;display:flex;flex-direction:column;gap:10px;">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <p style="color:#e5e7eb;font-weight:700;font-size:0.78rem;margin:0;">내 명적</p>
          <span style="color:#9ca3af;font-size:0.6rem;">최근 이김한 옷</span>
        </div>
        <div style="display:flex;gap:8px;flex:1;">
          <div class="inset-box" style="flex:1;height:100%;border-radius:12px;"></div>
          <div class="inset-box" style="flex:1;height:100%;border-radius:12px;"></div>
        </div>
      </div>

      <!-- ⑦ 계정 — 풀 너비, span 3 = 60px (row 32) -->
      <div class="card" style="grid-column:1/span 2;grid-row:32/span 3;padding:0 1.1rem;display:flex;align-items:center;justify-content:space-between;gap:10px;">
        <div style="display:flex;align-items:center;gap:6px;">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="2" stroke-linecap="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
          <span style="color:#9ca3af;font-size:0.72rem;font-weight:600;">계정</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px;margin-left:auto;">
          <button class="neu-btn neu-btn-danger" style="padding:5px 18px;font-size:0.7rem;font-weight:700;white-space:nowrap;">로그아웃</button>
          <button class="neu-btn neu-btn-ghost" style="padding:5px 13px;font-size:0.65rem;white-space:nowrap;">계정 삭제</button>
        </div>
      </div>

    </div>
  </main>

</body>
</html>
